  /* ---------- Load data ---------- */
  async function loadData() {
    try {
      const res = await fetch(CSV_URL, { signal: AbortSignal.timeout(5000) });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text).slice(1); // skip header
      tableData = rows.map(r => ({
        no:    r[0] || '',
        item:  r[1] || '',
        plan:  r[2] || '',
        step:  r[3] || '',
        date:  r[4] || '',
        owner: r[5] || '',
      }));
    } catch {
      tableData = FALLBACK.map(r => ({
        no: r[0], item: r[1], plan: r[2], step: r[3], date: r[4], owner: r[5]
      }));
    }
    renderTable(tableData);
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('mainTable').style.display  = 'table';
  }

  function parseCSV(text) {
    const rows = []; let row = []; let cell = ''; let inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQ) {
        if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
        else if (c === '"') inQ = false;
        else cell += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') { row.push(cell); cell = ''; }
        else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
        else if (c !== '\r') cell += c;
      }
    }
    if (cell || row.length) { row.push(cell); rows.push(row); }
    return rows;
  }

  /* ---------- Render ---------- */
  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = data.map((r, idx) => `
      <tr data-idx="${idx}">
        <td>${r.no}</td>
        <td class="col-item">${esc(r.item)}</td>
        <td class="col-plan">${r.plan ? esc(r.plan) : '<span class="empty-cell">—</span>'}</td>
        <td class="col-step">${r.step ? esc(r.step) : '<span class="empty-cell">—</span>'}</td>
        <td class="col-date">${r.date || ''}</td>
        <td class="col-owner">${esc(r.owner)}</td>
        <td><button class="btn-update" onclick="openModal(${idx})">แก้ไข</button></td>
      </tr>`).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ---------- Filter ---------- */
  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = q ? tableData.filter(r =>
      r.item.toLowerCase().includes(q) ||
      r.plan.toLowerCase().includes(q) ||
      r.step.toLowerCase().includes(q) ||
      r.owner.toLowerCase().includes(q)
    ) : tableData;
    renderTable(filtered);
  }

  /* ---------- Modal ---------- */
  function openModal(idx) {
    editingRow = idx;
    const r = tableData[idx];
    document.getElementById('modalItemName').textContent = `${r.no}. ${r.item}`;
    document.getElementById('inputPlan').value = r.plan;
    document.getElementById('inputStep').value = r.step;
    document.getElementById('overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('active');
    editingRow = null;
  }

  function saveRow() {
    if (editingRow === null) return;
    const now = new Date();
    const dateStr = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()+543}`;

    tableData[editingRow].plan = document.getElementById('inputPlan').value;
    tableData[editingRow].step = document.getElementById('inputStep').value;
    tableData[editingRow].date = dateStr;

    filterTable();
    closeModal();
    showToast('บันทึกข้อมูลเรียบร้อย — ' + dateStr);

    /* TODO: เขียนกลับ Google Sheets ด้วย Sheets API / Apps Script */
  }

  /* ---------- Toast ---------- */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  /* close modal on overlay click */
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  loadData();
</script>
</body>
</html>
